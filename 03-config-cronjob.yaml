apiVersion: batch/v1
kind: CronJob
metadata:
  name: config-puller-job
  namespace: default
spec:
  schedule: "*/1 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1  # Behalte nur den ALLERLETZTEN erfolgreichen Pod
  failedJobsHistoryLimit: 2      # Behalte max. zwei fehlerhafte Pods zur Fehlersuche
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: config-updater-sa
          containers:
          - name: updater
            # Wir nehmen Alpine, das lässt sich garantiert fehlerfrei ziehen
            image: alpine:latest
            imagePullPolicy: IfNotPresent
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e
                echo "=== KUBECTL INSTALLATION STRATEGIE (ARM64) ==="
                
                # 1. Installiere curl
                apk add --no-cache curl
                
                # 2. Lade das offizielle kubectl direkt für ARM64 (Apple Silicon) herunter
                curl -LO "https://dl.k8s.io/release/v1.28.2/bin/linux/arm64/kubectl"
                
                # 3. Mache es ausführbar und verschiebe es in den System-Pfad
                chmod +x ./kubectl
                mv ./kubectl /usr/local/bin/kubectl
                
                echo "Kubectl wurde erfolgreich installiert!"
                kubectl version --client
                
                echo "=== STARTE KONFIGURATIONS-UPDATE ==="
                
                # 4. Erzeuge die neue, dynamische Config-Datei
                echo "{\"status\": \"aktiv\", \"version\": \"1.0\", \"letztes_update\": \"$(date)\"}" > /tmp/neue-config.json
                
                echo "Schreibe geänderte Config in das Cluster..."
                kubectl create configmap dynamische-app-config \
                  --from-file=config.json=/tmp/neue-config.json \
                  --dry-run=client -o yaml | kubectl apply -f -
                
                echo "Triggere sicheren Kubernetes Rolling-Restart..."
                kubectl rollout restart deployment/meine-anwendung
                
                echo "=== PIPELINE ERFOLGREICH BEENDET ==="
          restartPolicy: OnFailure
