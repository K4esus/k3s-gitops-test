apiVersion: apps/v1
kind: Deployment
metadata:
  name: stress-oom-test
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stress-app
  template:
    metadata:
      labels:
        app: stress-app
    spec:
      containers:
      - name: stress-container
        image: polinux/stress:latest
        # Hier sagen wir dem Tool, dass es 150MB RAM belegen soll
        command: ["stress"]
        args: ["--vm", "1", "--vm-bytes", "150M", "--vm-hang", "10"]
        resources:
          requests:
            memory: "50Mi"
            cpu: "100m"
          limits:
            memory: "200Mi" # <-- Das Limit ist kleiner als die angeforderten 150M!
            cpu: "200m"
