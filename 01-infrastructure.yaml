apiVersion: v1
kind: ConfigMap
metadata:
  name: dynamische-app-config
  namespace: default
data:
  config.json: |
    {
      "status": "initial",
      "version": "1.0"
    }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: config-updater-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: config-updater-role
  namespace: default
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  resourceNames: ["dynamische-app-config"]
  verbs: ["get", "update", "patch", "create"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  resourceNames: ["meine-anwendung"]
  verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: config-updater-binding
  namespace: default
subjects:
- kind: ServiceAccount
  name: config-updater-sa
roleRef:
  kind: Role
  name: config-updater-role
  apiGroup: rbac.authorization.k8s.io
